# =============================================================================
# Render deployment configuration — XpressPro FX
# =============================================================================
# This file is read exclusively by Render.com.
#
# TWO DEPLOYMENT MODES:
#
# MODE A — Single-service (API + static frontend in one Render web service):
#   Set BUILD_ALL=true in the Render dashboard env vars.
#   The API server will serve the built frontend static files at / and /xpadmin.
#   buildCommand below already handles this when BUILD_ALL=true is set.
#
# MODE B — Multi-service (API on Render, frontends on Vercel/Netlify/CDN):
#   Leave BUILD_ALL unset. Only the API server runs here.
#   Deploy artifacts/nextrade and artifacts/admin-portal as separate static sites.
#
# Required env vars (set in the Render dashboard — do not commit real values):
#   NODE_ENV         = production
#   SESSION_SECRET   — strong random string
#                      node -e "console.log(require('crypto').randomBytes(64).toString('base64'))"
#   ADMIN_EMAIL      — admin portal login email
#   ADMIN_PASSWORD   — admin portal login password
#   ALLOWED_ORIGINS  — comma-separated frontend origins (https://app.yourdomain.com,...)
#   WALLET_ENCRYPTION_KEY — 64 hex chars
#                      node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#
# Optional (platform degrades gracefully without these):
#   DATABASE_URL, SENDGRID_API_KEY, SMTP_HOST/PORT/USER/PASS/FROM
#   ALCHEMY_API_KEY, INFURA_API_KEY
#   MOONPAY_API_KEY, MOONPAY_SECRET_KEY, MOONPAY_WEBHOOK_SECRET
#   COINBASE_API_KEY, COINBASE_API_SECRET, COINBASE_WEBHOOK_SECRET
#   AI_INTEGRATIONS_OPENAI_API_KEY, AI_INTEGRATIONS_OPENAI_BASE_URL
#   LOG_LEVEL (default: info), BUILD_ALL (set to "true" for single-service mode)
# =============================================================================

services:
  - type: web
    name: xpressfx-api
    runtime: node
    region: oregon
    plan: starter

    buildCommand: >-
      pnpm install --frozen-lockfile --no-audit --no-fund &&
      pnpm run predeploy &&
      pnpm run build --workspace artifacts/api-server &&
      if [ "${BUILD_ALL:-false}" = "true" ]; then
        pnpm run build --workspace artifacts/nextrade &&
        pnpm run build --workspace artifacts/admin-portal;
      fi

    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    healthCheckPath: /healthz

    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # PORT is injected automatically by Render — do not set it here.
      # The app reads process.env.PORT via assertRequiredEnv() in src/lib/env.ts.
