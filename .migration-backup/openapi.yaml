    GasFeeActionPolicy:
      type: object
      description: |
        Per-action gas-fee policy. Overrides the global default for a
        specific money-movement action (e.g. `withdrawal`, `deposit`,
        `wallet_transfer`, `asset_purchase`, `p2p_order`,
        `trade_release`).
      properties:
        enabled:
          type: boolean
          description: Whether the gas-fee gate runs for this action.
        requiredEthAmount:
          type: number
          description: ETH the user must hold across connected wallets.
        defaultFeeAmount:
          type: number
          description: |
            Default per-transaction ETH fee charged on admin approval
            (used as the prefilled value when the admin sets a fee on a
            specific withdrawal).
        deadlineSeconds:
          type: integer
          description: |
            How long the user has to fund the gas fee for this action
            before the request auto-expires.
        description:
          type: string
      required: [enabled, requiredEthAmount, defaultFeeAmount, deadlineSeconds, description]

    GasFeeSettings:
      type: object
      description: |
        Platform gas-fee policy. The top-level fields are the global
        default; `perAction` overrides individual money-movement actions.
      properties:
        requiredEthAmount:
          type: number
          description: Default ETH required across all gated actions.
        enabled:
          type: boolean
          description: Master toggle for the gas-fee gate.
        description:
          type: string
        perAction:
          type: object
          description: Action-keyed policy overrides.
          additionalProperties:
            $ref: "#/components/schemas/GasFeeActionPolicy"
      required: [requiredEthAmount, enabled, description]

    WithdrawalGasFeeStatus:
      type: object
      properties:
        enabled:
          type: boolean
        requiredEthAmount:
          type: number
        userEthBalance:
          type: number
        sufficient:
          type: boolean
        message:
          type: string
      required: [enabled, requiredEthAmount, userEthBalance, sufficient, message]

    WalletAdjustBody:
      type: object
      properties:
        walletId:
          type: string
        delta:
          type: number
          description: Positive to add funds, negative to subtract
        note:
          type: string
      required: [walletId, delta]

    CredentialVault:
      type: object
      properties:
        notes:
          type: string
          nullable: true
      required: []

    CryptoAddressMap:
      type: object
      additionalProperties:
        type: string
      description: Map of asset symbol to deposit wallet address (e.g. ETH -> 0x...)

    AdminUserDetail:
      type: object
      properties:
        userId:
          type: string
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [user, admin, demo]
        merchant:
          type: boolean
        tradingLocked:
          type: boolean
        socialLocked:
          type: boolean
        demoMode:
          type: boolean
        kycStatus:
