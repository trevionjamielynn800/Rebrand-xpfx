    MoonpayInitiateRequest:
      type: object
      properties:
        assetSymbol:
          type: string
          description: Crypto asset symbol to purchase (e.g. BTC, ETH, USDT).
        fiatAmount:
          type: number
          minimum: 1
          description: Fiat amount the user wants to spend.
        fiatCurrency:
          type: string
          description: Fiat currency code (e.g. USD, EUR).
        destinationAddress:
          type: string
          description: Wallet address that should receive the purchased crypto.
        destinationKind:
          type: string
          enum: [platform, external, custom]
          description: Source of the destination address.
      required: [assetSymbol, fiatAmount, fiatCurrency, destinationAddress, destinationKind]

    MoonpayInitiateResponse:
      type: object
      properties:
        url:
          type: string
          description: Hosted MoonPay checkout URL the user should be redirected to.
        sandbox:
          type: boolean
          description: True when the URL points at MoonPay sandbox (no live API key configured).
        signed:
          type: boolean
          description: True when the URL was HMAC-signed using the configured MoonPay secret.
        configured:
          type: boolean
          description: True when MOONPAY_API_KEY is configured server-side.
        autoFilled:
          type: boolean
          description: True when user identity (email/name) was auto-filled into the URL.
        notice:
          type: string
          nullable: true
          description: Optional human-readable notice to surface in the dialog.
      required: [url, sandbox, signed, configured, autoFilled]

    MoonpayWebhookEvent:
      type: object
      description: A subset of the MoonPay webhook payload we react to.
      properties:
        type:
          type: string
          description: Event type, e.g. "transaction_updated" or "transaction_completed".
        data:
          type: object
          description: The MoonPay transaction object.
          properties:
            id:
              type: string
            status:
              type: string
              description: e.g. pending, completed, failed.
            walletAddress:
              type: string
              nullable: true
            currency:
              type: object
              nullable: true
              properties:
                code:
                  type: string
            cryptoTransactionId:
              type: string
              nullable: true
            quoteCurrencyAmount:
              type: number
              nullable: true
              description: Amount of crypto purchased.
            baseCurrencyAmount:
              type: number
              nullable: true
              description: Fiat amount spent.
            baseCurrencyCode:
              type: string
              nullable: true
            externalCustomerId:
              type: string
              nullable: true
              description: Platform user id we passed in the checkout URL.
            externalTransactionId:
              type: string
              nullable: true
              description: Server-generated id we passed at /moonpay/initiate; used to look up the original destination so the webhook only credits platform wallets when the user picked one.
          required: [id, status]
      required: [type, data]

    CoinbaseInitiateRequest:
      type: object
      properties:
        assetSymbol:
          type: string
        fiatAmount:
          type: number
          minimum: 1
        fiatCurrency:
          type: string
        destinationAddress:
          type: string
        destinationKind:
          type: string
          enum: [platform, external, custom]
      required: [assetSymbol, fiatAmount, fiatCurrency, destinationAddress, destinationKind]

    CoinbaseInitiateResponse:
      type: object
      properties:
        url:
          type: string
        sandbox:
          type: boolean
        signed:
          type: boolean
        configured:
          type: boolean
        autoFilled:
