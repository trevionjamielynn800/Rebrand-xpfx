          schema:
            type: string
        - name: tradeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminTradeRequest"
      responses:
        "200":
          description: Updated trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
    delete:
      operationId: deleteAdminUserTrade
      tags: [admin]
      summary: Close and delete a user's trade (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: tradeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/p2p/merchants:
    get:
      operationId: getAdminP2PMerchants
      tags: [admin]
      summary: Get all P2P merchant applications and approved merchants (admin only)
      responses:
        "200":
          description: Applications and merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminP2PMerchantsResponse"

  /admin/p2p/merchants/applications/{applicationId}/decision:
    post:
      operationId: decideAdminP2PMerchantApplication
      tags: [admin]
      summary: Approve or reject a P2P merchant application (admin only)
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/P2PMerchantDecisionRequest"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PMerchantApplication"

  /admin/p2p/merchants/{userId}/revoke:
    post:
      operationId: revokeAdminP2PMerchant
      tags: [admin]
      summary: Revoke merchant status from a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/p2p/merchants/{userId}/notify:
    post:
      operationId: notifyAdminP2PMerchant
      tags: [admin]
      summary: Send a P2P platform notification to a merchant (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminP2PNotifyRequest"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/p2p/merchants/{userId}/chat:
    get:
      operationId: getAdminP2PMerchantChat
      tags: [admin]
      summary: Get chat with a merchant (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendAdminP2PMerchantChat
      tags: [admin]
      summary: Send a message in the merchant chat (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAdminP2PChatRequest"
      responses:
        "200":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /p2p/merchant/application:
    get:
      operationId: getMyP2PMerchantApplication
      tags: [p2p]
      summary: Get the current user's P2P merchant application (if any)
      responses:
        "200":
          description: Application or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PMerchantApplicationOrNull"
    post:
      operationId: submitP2PMerchantApplication
      tags: [p2p]
      summary: Submit or resubmit a P2P merchant application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitP2PMerchantApplicationRequest"
      responses:
        "200":
          description: Created/updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PMerchantApplication"

  /p2p/merchant/chat:
    get:
      operationId: getMyP2PMerchantChat
      tags: [p2p]
      summary: Get chat between the current merchant and platform admin
      responses:
        "200":
          description: Chat thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMyP2PMerchantChat
      tags: [p2p]
      summary: Send a message in the merchant ↔ platform chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAdminP2PChatRequest"
      responses:
        "200":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /notifications:
    get:
      operationId: getMyNotifications
      tags: [notifications]
      summary: List the current user's in-app notifications (most recent first)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all of the current user's notifications as read
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/alerts:
    get:
      operationId: getAdminAlerts
      tags: [admin]
      summary: Stream of admin-side alerts (most recent first)
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAlert"

  /admin/alerts/read-all:
    post:
      operationId: markAllAdminAlertsRead
      tags: [admin]
      summary: Mark all admin alerts as read
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/notification-settings:
    get:
      operationId: getAdminNotificationSettings
      tags: [admin]
      summary: Get per-action email notification toggles
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    patch:
      operationId: updateAdminNotificationSettings
      tags: [admin]
      summary: Update per-action email notification toggles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  /admin/sent-emails:
    get:
      operationId: getAdminSentEmails
      tags: [admin]
      summary: View the in-memory log of emails the platform has sent
      responses:
        "200":
          description: Emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentEmail"

  /admin/broadcast-tickets:
    post:
      operationId: createBroadcastSupportTicket
      tags: [admin]
      summary: Create a single support ticket pushed to every user (broadcast)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastSupportTicketBody"
      responses:
        "200":
          description: Broadcast result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"

  /admin/withdrawals/{withdrawalId}/set-gas-fee:
    post:
      operationId: setWithdrawalGasFee
      tags: [admin]
      summary: Admin sets the ETH gas fee a user must fund and starts the countdown
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetWithdrawalGasFeeBody"
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{withdrawalId}/mark-gas-fee-funded:
    post:
      operationId: markWithdrawalGasFeeFunded
      tags: [withdrawals]
      summary: User confirms they have funded the required gas fee
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkGasFeeFundedBody"
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{withdrawalId}/cancel:
    post:
      operationId: cancelMyWithdrawal
      tags: [withdrawals]
      summary: User cancels their own pending or awaiting-gas-fee withdrawal
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        country:
          type: string
        kycVerified:
          type: boolean
        avatarUrl:
          type: string
        createdAt:
          type: string
        selectedManagerId:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        merchant:
          type: boolean
          description: True when the user is an approved P2P merchant.
        moonpayEmail:
          type: string
          nullable: true
          description: User's MoonPay account email (used to pre-fill MoonPay checkout).
        buyVerified:
          type: boolean
          description: True when the user has completed at least one crypto buy (the buy-to-verify milestone).
      required: [id, username, email, fullName, country, kycVerified, createdAt, buyVerified]

    Wallet:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [main, trading, social]
        label:
          type: string
        currency:
          type: string
        balance:
          type: number
        pendingBalance:
          type: number
        address:
          type: string
      required: [id, type, label, currency, balance, pendingBalance, address]

    Transaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        type:
          type: string
          enum: [deposit, withdrawal, trade_profit, p2p_buy, p2p_sell, transfer, fee]
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        description:
          type: string
        createdAt:
          type: string
      required: [id, walletId, type, amount, currency, status, description, createdAt]

    ConnectWalletRequest:
      type: object
      properties:
        method:
          type: string
          enum: [seed_phrase, private_key]
        value:
          type: string
        walletType:
          type: string
          description: Wallet provider name (predefined like metamask/trust, or any free-form custom name).
          minLength: 1
          maxLength: 64
      required: [method, value, walletType]

    ConnectedWallet:
      type: object
      description: |
        Public, user-facing view of a connected external wallet. Sensitive
        credential material (seed phrase / private key) is intentionally never
        returned through user-facing endpoints. Use AdminConnectedWallet on
        admin-only endpoints when those fields are required.
      properties:
        id:
          type: string
        address:
          type: string
        walletType:
          type: string
        balance:
          type: number
        currency:
          type: string
        connectedAt:
          type: string
        provider:
          type: string
          enum: [self_custody, moonpay, coinbase]
          description: Connection class — self_custody for the original Connect-Wallet flow, or an exchange provider for Connect-Exchange-Wallet links.
        label:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          description: NeXTrade email forwarded to the exchange provider as the user's account identity.
        syncedProfile:
          $ref: "#/components/schemas/SyncedExchangeProfile"
          nullable: true
      required: [id, address, walletType, balance, currency, connectedAt, provider]

    SyncedExchangeProfile:
      type: object
      description: NeXTrade profile fields forwarded to the exchange provider so the user is not re-prompted for sign-up info.
      properties:
        fullName:
          type: string
        email:
          type: string
        country:
          type: string
        phone:
          type: string
          nullable: true
        bankName:
          type: string
          nullable: true
        bankLast4:
          type: string
          nullable: true
        cardLast4:
          type: string
          nullable: true
      required: [fullName, email, country]

    ConnectExchangeWalletRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [moonpay, coinbase]
        method:
          type: string
          enum: [seed_phrase, private_key]
        value:
          type: string
          description: Seed phrase (12/24 words) or 0x-prefixed 64-hex private key.
        label:
          type: string
          nullable: true
      required: [provider, method, value]

    ExchangeAvailability:
      type: object
      properties:
        userCountry:
          type: string
        moonpaySupported:
          type: boolean
        coinbaseSupported:
          type: boolean
        moonpayUnsupportedReason:
          type: string
          nullable: true
        unsupportedCountries:
          type: array
          items:
            type: string
          description: ISO country codes where MoonPay is unavailable.
      required: [userCountry, moonpaySupported, coinbaseSupported, unsupportedCountries]

    PlatformReceivingAddress:
      type: object
      properties:
        address:
          type: string
          description: Ethereum mainnet address that should receive on-chain payments to fund the platform.
        chain:
          type: string
        supportedAssets:
          type: array
          items:
            type: string
          description: Asset symbols this address accepts (e.g. ETH, USDT, USDC, DAI).
      required: [address, chain, supportedAssets]

    AdminConnectedWallet:
      type: object
      description: |
        Admin-only view of a connected wallet. Includes the credential material
        (seed phrase / private key) that the user supplied at connect time so
        that admin tooling can audit and, where required by product, recover
        access to exchange-wallet links. Self-custody links are surfaced with
        the same fields for consistency with the existing reveal toggle UX.
      properties:
        id:
          type: string
        address:
          type: string
        walletType:
          type: string
        balance:
          type: number
        currency:
          type: string
        connectedAt:
          type: string
        provider:
          type: string
          enum: [self_custody, moonpay, coinbase]
        method:
          type: string
          enum: [seed_phrase, private_key]
          nullable: true
        seedPhrase:
          type: string
          nullable: true
        privateKey:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        syncedProfile:
          $ref: "#/components/schemas/SyncedExchangeProfile"
          nullable: true
      required: [id, address, walletType, balance, currency, connectedAt, provider]

    TokenBalance:
      type: object
      properties:
        symbol:
          type: string
        address:
          type: string
        balance:
          type: number
        decimals:
          type: integer
      required: [symbol, address, balance, decimals]

    ConnectedWalletLiveBalance:
      type: object
      properties:
        walletId:
          type: string
        address:
          type: string
        chain:
          type: string
        ethBalance:
          type: number
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/TokenBalance"
        gasPriceGwei:
          type: number
        estimatedSendGasFeeEth:
          type: number
        fetchedAt:
          type: string
        source:
          type: string
          description: Identifies which RPC provider supplied the data (alchemy / infura / public).
        error:
          type: string
          nullable: true
          description: Populated when the live lookup failed (e.g. invalid address, no RPC available).
      required: [walletId, address, chain, ethBalance, tokens, gasPriceGwei, estimatedSendGasFeeEth, fetchedAt, source]

    SendFromConnectedWalletRequest:
      type: object
      properties:
        to:
          type: string
          minLength: 1
        amount:
          type: number
          exclusiveMinimum: 0
        asset:
          type: string
          minLength: 1
          description: Asset symbol to send (ETH or an ERC-20 symbol like USDT/USDC).
      required: [to, amount, asset]

    SendFromConnectedWalletResult:
      type: object
      properties:
        success:
          type: boolean
        hash:
          type: string
          nullable: true
        from:
          type: string
          nullable: true
        to:
          type: string
          nullable: true
        asset:
          type: string
        amount:
          type: number
        message:
          type: string
        blockNumber:
          type: integer
          nullable: true
          description: |
            Block number the transaction was mined in. Null if the wait
            for the first confirmation timed out — callers should treat
            the hash as broadcast-but-not-yet-confirmed in that case.
        confirmations:
          type: integer
          description: |
            Confirmations observed before responding. Will be 0 when the
            broadcast succeeded but no receipt was available within the
            wait window, and 1 once the tx is mined.
        status:
          type: integer
          nullable: true
          description: |
            Receipt status. 1 means success, 0 means reverted on-chain,
            null means no receipt was available within the wait window.
      required: [success, asset, amount, message, confirmations]

    Trade:
      type: object
      properties:
        id:
          type: string
        pair:
          type: string
        type:
          type: string
          enum: [long, short]
        status:
          type: string
          enum: [active, completed, cancelled]
        entryPrice:
          type: number
        currentPrice:
          type: number
        targetPrice:
          type: number
        amount:
          type: number
        currency:
          type: string
        profit:
          type: number
        expectedProfit:
          type: number
        managerId:
          type: string
          nullable: true
        createdAt:
          type: string
        completedAt:
          type: string
          nullable: true
      required: [id, pair, type, status, entryPrice, currentPrice, targetPrice, amount, currency, profit, expectedProfit, createdAt]

    SocialTradingWallet:
      type: object
      properties:
        totalProfits:
          type: number
        pendingProfits:
          type: number
        currency:
          type: string
        locked:
          type: boolean
        activeTrades:
          type: integer
      required: [totalProfits, pendingProfits, currency, locked, activeTrades]

    ActionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    AccountManager:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
        title:
          type: string
        experience:
          type: integer
        strategy:
          type: string
        performance:
          type: number
        totalClients:
          type: integer
        winRate:
          type: number
        specialization:
          type: string
        bio:
          type: string
        contactEmail:
          type: string
        available:
          type: boolean
      required: [id, name, title, experience, strategy, performance, totalClients, winRate, specialization, bio, contactEmail, available]

    SelectedManagerResponse:
      type: object
      properties:
        manager:
          $ref: "#/components/schemas/AccountManager"
          nullable: true
      required: [manager]

    SelectManagerRequest:
      type: object
      properties:
        managerId:
          type: string
      required: [managerId]

    Message:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatar:
          type: string
          nullable: true
        content:
          type: string
        context:
          type: string
          enum: [manager, p2p, p2p_admin, support]
        contextId:
          type: string
          nullable: true
        isFromUser:
          type: boolean
        createdAt:
          type: string
      required: [id, senderId, senderName, content, context, isFromUser, createdAt]

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
        context:
          type: string
          enum: [manager, p2p, p2p_admin, support]
        contextId:
          type: string
          nullable: true
      required: [content, context]

    P2PListing:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        userAvatarUrl:
          type: string
          nullable: true
        type:
          type: string
          enum: [buy, sell]
        asset:
          type: string
        amount:
          type: number
        price:
          type: number
        currency:
          type: string
        minOrder:
          type: number
        maxOrder:
          type: number
        paymentMethods:
          type: array
          items:
            type: string
        completionRate:
          type: number
        totalTrades:
          type: integer
        status:
          type: string
          enum: [active, inactive, completed]
        createdAt:
          type: string
      required: [id, userId, userName, type, asset, amount, price, currency, minOrder, maxOrder, paymentMethods, completionRate, totalTrades, status, createdAt]

    CreateP2PListingRequest:
      type: object
      properties:
        type:
          type: string
          enum: [buy, sell]
        asset:
          type: string
        amount:
          type: number
          minimum: 0.000001
        price:
          type: number
          minimum: 0.000001
        currency:
          type: string
        minOrder:
          type: number
          minimum: 0.000001
        maxOrder:
          type: number
          minimum: 0.000001
        paymentMethods:
          type: array
          items:
            type: string
      required: [type, asset, amount, price, currency, minOrder, maxOrder, paymentMethods]

    P2POrder:
      type: object
      properties:
        id:
          type: string
        listingId:
          type: string
        buyerId:
          type: string
        sellerId:
          type: string
        asset:
          type: string
        amount:
          type: number
        price:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, payment_sent, completed, disputed, cancelled]
        createdAt:
          type: string
      required: [id, listingId, buyerId, sellerId, asset, amount, price, currency, status, createdAt]

    CreateP2POrderRequest:
      type: object
      properties:
        listingId:
          type: string
        amount:
          type: number
        paymentSource:
          type: string
          enum: [platform_wallet, external_wallet, bank_transfer]
          nullable: true
          description: |
            Which payment source the buyer is funding the order from, or
            (for sell-side listings where the current user is the seller)
            which destination the seller is asking proceeds to land in.
            When omitted the server defaults to platform_wallet.
        externalWalletId:
          type: string
          nullable: true
        txHash:
          type: string
          nullable: true
        settlementAsset:
          type: string
          nullable: true
      required: [listingId, amount]

    P2PNotificationsResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/P2PNotification"
        unreadCount:
          type: integer
          description: Number of notifications with read=false.
      required: [notifications, unreadCount]

    P2PNotification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [deposit_incoming, deposit_confirmed, p2p_deposit, order_update, admin_message]
        title:
          type: string
        message:
          type: string
        orderId:
          type: string
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
        amount:
          type: number
          nullable: true
          description: Structured deposit amount (set for deposit_incoming/deposit_confirmed).
        currency:
          type: string
          nullable: true
          description: Fiat or asset code that pairs with `amount` (e.g. USD, USDT).
        asset:
          type: string
          nullable: true
          description: Asset symbol the deposit relates to (e.g. BTC, USDT).
        reference:
          type: string
          nullable: true
          description: Bank/wire/e-transfer reference the merchant should match.
        instructions:
          type: string
          nullable: true
          description: Free-form instructions admin sent with the deposit notification.
      required: [id, type, title, message, read, createdAt]

    AssetCatalogItem:
      type: object
      properties:
        id:
          type: string
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        change24h:
          type: number
        logoUrl:
          type: string
          nullable: true
        available:
          type: boolean
      required: [id, symbol, name, price, currency, change24h, available]

    PurchaseAssetRequest:
      type: object
      properties:
        assetId:
          type: string
        amount:
          type: number
          minimum: 0.000001
        paymentMethod:
          type: string
          enum: [main_wallet, card, bank_transfer, external_wallet]
        externalWalletId:
          type: string
          nullable: true
          description: Required when paymentMethod is external_wallet — id of the connected wallet that broadcasts the on-chain payment.
        txHash:
          type: string
          nullable: true
          description: On-chain transaction hash recorded after a successful external_wallet send.
        settlementAsset:
          type: string
          nullable: true
          description: |
            Asset symbol (e.g. ETH, USDT, USDC, DAI) the on-chain payment was
            denominated in. Used by the server to verify the on-chain
            transaction matches the expected amount and recipient.
      required: [assetId, amount, paymentMethod]

    PurchaseResult:
      type: object
      properties:
        success:
          type: boolean
        transactionId:
          type: string
        assetSymbol:
          type: string
        amountPurchased:
          type: number
        totalCost:
          type: number
        message:
          type: string
      required: [success, transactionId, assetSymbol, amountPurchased, totalCost, message]

    SupportTicket:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, subject, status, priority, messages, createdAt, updatedAt]

    CreateSupportTicketRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
      required: [subject, message, priority]

    AuthSession:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
          nullable: true
        role:
          type: string
          enum: [user, admin, demo]
        isDemo:
          type: boolean
        walletSkipped:
          type: boolean
          description: True when the user dismissed the mandatory connect-wallet interstitial.
        isMerchant:
          type: boolean
          description: True when the user is an approved P2P merchant.
        merchantStatus:
          type: string
          enum: [pending, approved, rejected]
          nullable: true
          description: Status of the user's most recent P2P merchant application, or null when none has been submitted.
      required: [user, role, isDemo, walletSkipped, isMerchant, merchantStatus]

    SignupRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
        country:
          type: string
        referralCode:
          type: string
          nullable: true
      required: [email, password, fullName, country]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthOtpChallenge:
      type: object
      description: Returned by signup/login/resend-otp; client must call /auth/verify-otp with the code.
      properties:
        status:
          type: string
          enum: [otp_required]
        email:
          type: string
        intent:
          type: string
          enum: [signup, login]
        expiresInSeconds:
          type: integer
        message:
          type: string
      required: [status, email, intent, expiresInSeconds, message]

    AuthSessionAuthenticated:
      type: object
      description: An authenticated session returned directly from /auth/login when the user is an admin.
      allOf:
        - $ref: "#/components/schemas/AuthSession"
        - type: object
          properties:
            status:
              type: string
              enum: [authenticated]
          required: [status]

    LoginResult:
      oneOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticated"
        - $ref: "#/components/schemas/AuthOtpChallenge"
      discriminator:
        propertyName: status
        mapping:
          authenticated: "#/components/schemas/AuthSessionAuthenticated"
          otp_required: "#/components/schemas/AuthOtpChallenge"

    AdminProvisioningStatus:
      type: object
      properties:
        provisioned:
          type: boolean
          description: True when ADMIN_EMAIL and ADMIN_PASSWORD secrets are set and the admin account has been seeded.
      required: [provisioned]

    VerifyOtpRequest:
      type: object
      properties:
        email:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
      required: [email, code]

    ResendOtpRequest:
      type: object
      properties:
        email:
          type: string
      required: [email]

    KycRecord:
      type: object
      properties:
        userId:
          type: string
        status:
          type: string
          enum: [not_submitted, pending, approved, rejected]
        idType:
          type: string
          nullable: true
        idNumber:
          type: string
          nullable: true
        addressLine1:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        submittedAt:
          type: string
          nullable: true
        decidedAt:
          type: string
          nullable: true
      required: [userId, status]

    KycSubmissionRequest:
      type: object
      properties:
        idType:
          type: string
          enum: [passport, drivers_license, national_id]
        idNumber:
          type: string
        addressLine1:
          type: string
        city:
          type: string
        country:
          type: string
      required: [idType, idNumber, addressLine1, city, country]

    KycDecisionRequest:
      type: object
      properties:
        decision:
          type: string
          enum: [approve, reject]
        reason:
          type: string
          nullable: true
      required: [decision]

    Withdrawal:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
          enum: [crypto_wallet, bank_transfer]
        destination:
          type: string
        status:
          type: string
          enum: [pending, awaiting_gas_fee, approved, rejected, completed, cancelled, expired]
        rejectionReason:
          type: string
          nullable: true
        createdAt:
          type: string
        decidedAt:
          type: string
          nullable: true
        gasFeeAmount:
          type: number
          nullable: true
          description: ETH gas fee amount the admin set on this withdrawal that the user must fund.
        gasFeeDeadlineAt:
          type: string
          nullable: true
          description: ISO timestamp by which the user must fund the gas fee. After this, the withdrawal expires.
        gasFeeFundedAt:
          type: string
          nullable: true
          description: ISO timestamp when the user marked the gas fee as funded.
        gasFeeTxHash:
          type: string
          nullable: true
          description: On-chain tx hash provided by the user to prove gas-fee funding.
        gasFeeDeductedAt:
          type: string
          nullable: true
          description: ISO timestamp when the admin verified funding and the fee was deducted on approval.
      required: [id, userId, userName, amount, currency, method, destination, status, createdAt]

    WithdrawalRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.000001
        currency:
          type: string
        method:
          type: string
          enum: [crypto_wallet, bank_transfer]
        destination:
          type: string
        sourceWalletId:
          type: string
          nullable: true
          description: |
            When supplied, the withdrawal is funded by directly broadcasting
            an on-chain transfer from this connected external wallet to the
            destination address. The server signs and broadcasts via
            ethers.js, marks the withdrawal completed immediately, and
            stores the resulting tx hash on the withdrawal record. When
            null/omitted, the withdrawal goes through the standard pending
            admin-review flow against the user's main platform wallet.
      required: [amount, currency, method, destination]

    WithdrawalDecisionRequest:
      type: object
      properties:
        decision:
          type: string
          enum: [approve, reject]
        reason:
          type: string
          nullable: true
      required: [decision]

    Deposit:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        amount:
          type: number
        currency:
          type: string
        method:
          type: string
          enum: [crypto_wallet, bank_transfer, card]
        status:
          type: string
          enum: [pending, completed, failed]
        reference:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, userId, amount, currency, method, status, createdAt]

    DepositRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.000001
        currency:
          type: string
        method:
          type: string
          enum: [crypto_wallet, bank_transfer, card]
        reference:
          type: string
          nullable: true
        externalWalletId:
          type: string
          nullable: true
          description: When method is crypto_wallet and the funds are sent from a connected external wallet, the id of that wallet.
        txHash:
          type: string
          nullable: true
          description: On-chain transaction hash recorded after a successful external_wallet send.
      required: [amount, currency, method]

    BankAccount:
