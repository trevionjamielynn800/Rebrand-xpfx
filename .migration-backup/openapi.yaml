        fiatBalance:
          type: number
          description: User-reported (or admin-set) available fiat balance for this bank account.
        fiatCurrency:
          type: string
          description: ISO currency code for the fiat balance (defaults to the bank's currency).
        createdAt:
          type: string
      required: [id, userId, bankName, accountHolder, last4, currency, verified, fiatBalance, fiatCurrency, createdAt]

    LinkBankRequest:
      type: object
