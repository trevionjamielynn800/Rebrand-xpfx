          nullable: true
        cryptoCode:
          type: string
          nullable: true
        processedAt:
          type: string
          format: date-time
          nullable: true
        destinationKind:
          type: string
          nullable: true
          enum: [platform, external, custom]
        destinationAddress:
          type: string
          nullable: true
        assetSymbol:
          type: string
          nullable: true
        fiatAmount:
          type: number
          nullable: true
        fiatCurrency:
          type: string
          nullable: true
      required: [id, status]

    CoinbaseWebhookEvent:
      type: object
      properties:
        type:
          type: string
        data:
          type: object
          properties:
            id:
              type: string
            status:
              type: string
            walletAddress:
              type: string
              nullable: true
            currency:
              type: object
              nullable: true
              properties:
