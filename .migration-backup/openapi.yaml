openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: XpressPro FX Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User account operations
  - name: wallets
    description: Wallet operations
  - name: trades
    description: Trading operations
  - name: managers
    description: Account manager operations
  - name: messages
    description: Messaging operations
  - name: p2p
    description: P2P trading operations
  - name: support
    description: Customer support operations
  - name: assets
    description: Asset purchase operations
  - name: profile
    description: User profile self-service operations
  - name: moonpay
    description: MoonPay buy-crypto integration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /wallets:
    get:
      operationId: getWallets
      tags: [wallets]
      summary: Get user wallets
      responses:
        "200":
          description: List of wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wallet"

  /wallets/transactions:
    get:
      operationId: getTransactions
      tags: [wallets]
      summary: Get wallet transactions
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /wallets/connect:
    post:
      operationId: connectExternalWallet
      tags: [wallets]
      summary: Connect an external wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectWalletRequest"
      responses:
        "200":
          description: Connected wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectedWallet"

  /wallets/exchange/connect:
    post:
      operationId: connectExchangeWallet
      tags: [wallets]
      summary: Link a MoonPay or Coinbase exchange account as an exchange wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectExchangeWalletRequest"
      responses:
        "200":
          description: Connected exchange wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectedWallet"

  /wallets/exchange/{walletId}:
    delete:
      operationId: disconnectExchangeWallet
      tags: [wallets]
      summary: Remove a previously connected exchange wallet
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /platform/exchange-availability:
    get:
      operationId: getExchangeAvailability
      tags: [platform]
      summary: Region availability of supported exchange wallet providers
      responses:
        "200":
          description: Exchange availability for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeAvailability"

  /coinbase/initiate:
    post:
      operationId: initiateCoinbaseBuy
      tags: [coinbase]
      summary: Build a Coinbase hosted-checkout URL for a Buy Crypto flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoinbaseInitiateRequest"
      responses:
        "200":
          description: Coinbase checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinbaseInitiateResponse"

  /coinbase/status/{id}:
    get:
      operationId: getCoinbaseStatus
      tags: [coinbase]
      summary: Look up the settlement status of a Coinbase Buy Crypto transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Coinbase transaction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinbaseStatusResponse"

  /coinbase/webhook:
    post:
      operationId: coinbaseWebhook
      tags: [coinbase]
      summary: Coinbase transaction webhook (purchase completion events)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoinbaseWebhookEvent"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get user trades
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/social-wallet:
    get:
      operationId: getSocialTradingWallet
      tags: [trades]
      summary: Get social trading wallet summary
      responses:
        "200":
          description: Social trading wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialTradingWallet"

  /trades/{tradeId}/release:
    post:
      operationId: releaseTradeFunds
      tags: [trades]
      summary: Release completed trade funds to main wallet
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /managers:
    get:
      operationId: getManagers
      tags: [managers]
      summary: Get list of account managers
      responses:
        "200":
          description: List of managers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountManager"

  /managers/selected:
    get:
      operationId: getSelectedManager
      tags: [managers]
      summary: Get user's selected account manager
      responses:
        "200":
          description: Selected manager or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectedManagerResponse"
    post:
      operationId: selectManager
      tags: [managers]
      summary: Select an account manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectManagerRequest"
      responses:
        "200":
          description: Selection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages with manager or in P2P context
      parameters:
        - name: context
          in: query
          required: false
          schema:
            type: string
            enum: [manager, p2p, support]
        - name: contextId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /p2p/listings:
    get:
      operationId: getP2PListings
      tags: [p2p]
      summary: Get P2P marketplace listings
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [buy, sell]
        - name: asset
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of P2P listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/P2PListing"
    post:
      operationId: createP2PListing
      tags: [p2p]
      summary: Create a new P2P listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateP2PListingRequest"
      responses:
        "200":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PListing"

  /p2p/orders:
    get:
      operationId: getP2POrders
      tags: [p2p]
      summary: Get user's P2P orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/P2POrder"
    post:
      operationId: createP2POrder
      tags: [p2p]
      summary: Create a P2P order (initiate trade)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateP2POrderRequest"
      responses:
        "200":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2POrder"

  /p2p/notifications:
    get:
      operationId: getP2PNotifications
      tags: [p2p]
      summary: Get P2P admin notifications
      responses:
        "200":
          description: List of notifications with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PNotificationsResponse"

  /p2p/notifications/{id}/read:
    post:
      operationId: markP2PNotificationRead
      tags: [p2p]
      summary: Mark a P2P notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notifications list with updated unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PNotificationsResponse"
        "404":
          description: Notification not found

  /assets/catalog:
    get:
      operationId: getAssetCatalog
      tags: [assets]
      summary: Get available assets to purchase
      responses:
        "200":
          description: Asset catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetCatalogItem"

  /assets/purchase:
    post:
      operationId: purchaseAsset
      tags: [assets]
      summary: Purchase an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseAssetRequest"
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResult"

  /support/tickets:
    get:
      operationId: getSupportTickets
      tags: [support]
      summary: Get user support tickets
      responses:
        "200":
          description: List of support tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketRequest"
      responses:
        "200":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user (sends OTP, does not create session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: OTP challenge issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOtpChallenge"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password (admins authenticate immediately, others receive an OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Either an authenticated session (admins) or an OTP challenge (regular users)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /admin/provisioning-status:
    get:
      operationId: getAdminProvisioningStatus
      tags: [admin]
      summary: Public — whether the admin account has been seeded from environment secrets
      responses:
        "200":
          description: Provisioning status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProvisioningStatus"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify a 6-digit OTP and complete the auth flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Generate and resend a fresh OTP for a pending challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpRequest"
      responses:
        "200":
          description: New OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOtpChallenge"

  /auth/skip-wallet:
    post:
      operationId: skipWalletConnect
      tags: [auth]
      summary: Mark the wallet-connect interstitial as skipped for this user
      responses:
        "200":
          description: Updated session reflecting walletSkipped=true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current authenticated session (or null)
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /auth/demo:
    post:
      operationId: startDemoSession
      tags: [auth]
      summary: Start a fresh demo session (no signup needed)
      responses:
        "200":
          description: Demo session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /kyc:
    get:
      operationId: getKycStatus
      tags: [kyc]
      summary: Get current user KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"
    post:
      operationId: submitKyc
      tags: [kyc]
      summary: Submit KYC documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycSubmissionRequest"
      responses:
        "200":
          description: Submitted KYC record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: List the current user's withdrawals
      responses:
        "200":
          description: List of withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: requestWithdrawal
      tags: [withdrawals]
      summary: Request a new withdrawal (enters pending state)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "200":
          description: Pending withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /deposits:
    get:
      operationId: getDeposits
      tags: [deposits]
      summary: List the current user's deposits
      responses:
        "200":
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Record a new deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositRequest"
      responses:
        "200":
          description: Created deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /banks:
    get:
      operationId: getBankAccounts
      tags: [banks]
      summary: List linked bank accounts
      responses:
        "200":
          description: List of bank accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankAccount"
    post:
      operationId: linkBankAccount
      tags: [banks]
      summary: Link a new bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkBankRequest"
      responses:
        "200":
          description: Linked bank account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"

  /banks/{bankId}:
    patch:
      operationId: updateOwnBankAccount
      tags: [banks]
      summary: Update self-reported fiat balance for a linked bank account
      parameters:
        - name: bankId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnBankAccountRequest"
      responses:
        "200":
          description: Updated bank account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"

  /auth/profile:
    patch:
      operationId: updateOwnProfile
      tags: [profile]
      summary: Update fields on the current user's own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnProfileRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /moonpay/initiate:
    post:
      operationId: initiateMoonpayBuy
      tags: [moonpay]
      summary: Build a MoonPay hosted-checkout URL for a Buy Crypto flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoonpayInitiateRequest"
      responses:
        "200":
          description: MoonPay checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoonpayInitiateResponse"

  /moonpay/webhook:
    post:
      operationId: moonpayWebhook
      tags: [moonpay]
      summary: MoonPay transaction webhook (purchase completion events)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoonpayWebhookEvent"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /referrals:
    get:
      operationId: getReferralInfo
      tags: [referrals]
      summary: Current user's referral code, signups, and earnings
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard summary stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all platform users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserSummary"

  /admin/withdrawals:
    get:
      operationId: getAdminWithdrawals
      tags: [admin]
      summary: List all withdrawals (admin only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, awaiting_gas_fee, approved, rejected, completed, cancelled, expired]
      responses:
        "200":
          description: List of withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /admin/withdrawals/{withdrawalId}/decision:
    post:
      operationId: decideWithdrawal
      tags: [admin]
      summary: Approve or reject a pending withdrawal
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalDecisionRequest"
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/kyc/{userId}/decision:
    post:
      operationId: decideKyc
      tags: [admin]
      summary: Approve or reject a KYC submission
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycDecisionRequest"
      responses:
        "200":
          description: Updated KYC record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"

  /admin/banks:
    get:
      operationId: getAdminBanks
      tags: [admin]
      summary: List all linked bank accounts across users (admin only)
      responses:
        "200":
          description: List of bank accounts with user info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBankSummary"

  /admin/banks/{bankId}/verification:
    post:
      operationId: setBankVerification
      tags: [admin]
      summary: Set the verified flag on a linked bank account
      parameters:
        - name: bankId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankVerificationRequest"
      responses:
        "200":
          description: Updated bank account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBankSummary"

  /platform/receiving-address:
    get:
      operationId: getPlatformReceivingAddress
      tags: [wallets]
      summary: Returns the platform's on-chain receiving address for stablecoin/ETH funding
      description: |
        Returns the address users should send to when funding the platform via
        an external wallet (deposits, asset purchases, P2P buys settled
        on-chain). Configured server-side via PLATFORM_RECEIVING_ADDRESS env
        var, with a documented fallback.
      responses:
        "200":
          description: Platform receiving address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformReceivingAddress"

  /wallets/connected:
    get:
      operationId: getConnectedWallets
      tags: [wallets]
      summary: List the user's connected external wallets
      responses:
        "200":
          description: List of connected external wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectedWallet"

  /wallets/connected/{walletId}/balance:
    get:
      operationId: getConnectedWalletBalance
      tags: [wallets]
      summary: Fetch live on-chain balance and gas price for a connected wallet
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
