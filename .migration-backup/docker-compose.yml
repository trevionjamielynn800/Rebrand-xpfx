version: '3.8'

services:
  # === API Server ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xpressprofx-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - xpressprofx-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # === PostgreSQL Database ===
  postgres:
    image: postgres:16-alpine
    container_name: xpressprofx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xpressprofx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: xpressprofx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xpressprofx-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpressprofx -d xpressprofx"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (BullMQ + Rate Limiting + Cache) ===
  redis:
    image: redis:7-alpine
    container_name: xpressprofx-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - xpressprofx-net
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # === Nginx Reverse Proxy + SSL ===
  nginx:
    image: nginx:alpine
    container_name: xpressprofx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - xpressprofx-net

  # === Certbot for Let's Encrypt ===
  certbot:
    image: certbot/certbot:latest
    container_name: xpressprofx-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:

networks:
  xpressprofx-net:
    driver: bridge
