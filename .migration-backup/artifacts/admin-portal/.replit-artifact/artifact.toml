kind = "web"
previewPath = "/xpadmin/"
title = "XpressPro FX — Admin Portal"
version = "1.0.0"
id = "artifacts/admin-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/xpadmin/" ]
localPort = 25580

[services.development]
run = "pnpm --filter @workspace/admin-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-portal", "run", "build" ]
publicDir = "artifacts/admin-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25580"
BASE_PATH = "/xpadmin/"
